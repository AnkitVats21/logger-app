{{define "title"}}Today Dashboard{{end}}

{{define "content"}}
<div class="max-w-4xl mx-auto">
    <header class="text-center mb-10">
        <h1 class="text-5xl font-black tracking-tight text-gray-900 dark:text-white mb-2" id="live-clock">--:--:--</h1>
        <p class="text-xl text-gray-500 dark:text-gray-400 font-medium" id="current-date">Loading...</p>
    </header>

    <!-- Main Today View -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

        <!-- Action & Status Panel -->
        <div
            class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-sm border border-gray-100 dark:border-slate-700 flex flex-col justify-center">
            <div class="text-center mb-8">
                <p class="text-sm font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-1">Current
                    Status</p>
                <div class="text-2xl font-bold text-gray-900 dark:text-white flex items-center justify-center gap-2"
                    id="current-location">
                    <i data-lucide="map-pin" class="w-6 h-6 text-gray-400"></i>
                    <span>Unknown</span>
                </div>
                <p class="text-sm text-gray-500 mt-2" id="total-elapsed">Elapsed: 0h 0m</p>
            </div>

            <div class="space-y-4">
                <button onclick="logEvent('home')"
                    class="w-full py-4 px-6 rounded-2xl font-bold text-white bg-blue-600 hover:bg-blue-700 transition flex items-center justify-center gap-2 shadow-lg shadow-blue-600/20">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    Log Home
                </button>
                <button onclick="logEvent('office')"
                    class="w-full py-4 px-6 rounded-2xl font-bold text-white bg-green-600 hover:bg-green-700 transition flex items-center justify-center gap-2 shadow-lg shadow-green-600/20">
                    <i data-lucide="briefcase" class="w-5 h-5"></i>
                    Log Office
                </button>
                <button onclick="logEvent('outside')"
                    class="w-full py-4 px-6 rounded-2xl font-bold text-white bg-yellow-500 hover:bg-yellow-600 transition flex items-center justify-center gap-2 shadow-lg shadow-yellow-500/20">
                    <i data-lucide="sun" class="w-5 h-5"></i>
                    Log Outside
                </button>
            </div>
            <div id="log-error" class="text-red-500 text-sm font-medium text-center mt-4 hidden"></div>
        </div>

        <!-- Donut Chart & Distribution -->
        <div
            class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-sm border border-gray-100 dark:border-slate-700 flex flex-col items-center justify-center">
            <h2 class="text-lg font-bold text-gray-900 dark:text-white mb-6 w-full flex items-center gap-2">
                <i data-lucide="pie-chart" class="text-blue-500 w-5 h-5"></i>
                Time Distribution
            </h2>

            <!-- CSS Conic Gradient Donut -->
            <div class="relative w-56 h-56 sm:w-64 sm:h-64 rounded-full mb-8 flex items-center justify-center transition-all duration-500"
                id="donut-chart" style="background: conic-gradient(#f3f4f6 0% 100%);">
                <!-- Inner circle for donut hole -->
                <div
                    class="absolute inset-2 bg-white dark:bg-slate-800 rounded-full flex flex-col items-center justify-center">
                    <span class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Today</span>
                    <span class="text-xl font-black text-gray-900 dark:text-white" id="center-elapsed">0h 0m</span>
                </div>
            </div>

            <!-- Legend -->
            <div class="grid grid-cols-2 gap-4 w-full text-sm">
                <div class="flex items-center justify-between bg-gray-50 dark:bg-slate-700/50 p-3 rounded-xl">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                        <span class="text-gray-700 dark:text-gray-300 font-medium">Home</span>
                    </div>
                    <span class="font-bold text-gray-900 dark:text-white" id="legend-home">0h 0m</span>
                </div>
                <div class="flex items-center justify-between bg-gray-50 dark:bg-slate-700/50 p-3 rounded-xl">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-green-500"></div>
                        <span class="text-gray-700 dark:text-gray-300 font-medium">Office</span>
                    </div>
                    <span class="font-bold text-gray-900 dark:text-white" id="legend-office">0h 0m</span>
                </div>
                <div class="flex items-center justify-between bg-gray-50 dark:bg-slate-700/50 p-3 rounded-xl">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                        <span class="text-gray-700 dark:text-gray-300 font-medium">Outside</span>
                    </div>
                    <span class="font-bold text-gray-900 dark:text-white" id="legend-outside">0h 0m</span>
                </div>
                <div class="flex items-center justify-between bg-gray-50 dark:bg-slate-700/50 p-3 rounded-xl">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-red-500"></div>
                        <span class="text-gray-700 dark:text-gray-300 font-medium">Commute</span>
                    </div>
                    <span class="font-bold text-gray-900 dark:text-white" id="legend-commute">0h 0m</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Today's Activity Timeline -->
    <div class="mt-12">
        <h2 class="text-2xl font-black text-gray-900 dark:text-white mb-8 flex items-center gap-3">
            <i data-lucide="activity" class="text-blue-600 w-7 h-7"></i>
            Today's Activity
        </h2>
        <div id="today-timeline"
            class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-sm border border-gray-100 dark:border-slate-700">
            <p class="text-gray-400 italic text-center py-8">Loading your activity timeline...</p>
        </div>
    </div>
</div>

<!-- Toast Alert Component -->
<div id="toast-alert" class="fixed top-4 right-4 z-50 transform transition-all duration-300 translate-x-full opacity-0">
    <div class="bg-red-500 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <i data-lucide="alert-circle" class="w-6 h-6"></i>
            <span id="toast-message" class="font-bold">Error message</span>
        </div>
        <button onclick="closeToast()" class="text-white/80 hover:text-white p-1">
            <i data-lucide="x" class="w-4 h-4"></i>
        </button>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });

        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = now.toLocaleDateString('en-US', options);
    }

    // Convert "5h 30m" to decimal hours for ratio calculation
    function parseDuration(durStr) {
        if (!durStr) return 0;
        let hours = 0, mins = 0;
        let hMatch = durStr.match(/(\d+)h/);
        let mMatch = durStr.match(/(\d+)m/);

        if (hMatch) hours = parseInt(hMatch[1]);
        if (mMatch) mins = parseInt(mMatch[1]);

        return hours + (mins / 60);
    }

    async function loadTodayData() {
        const userId = getUserId();
        if (!userId) return;

        try {
            const res = await fetch(`/api/today-summary?userid=${userId}`);
            const data = await res.json();

            // Extract decimal hours
            const home = parseDuration(data.totals.home);
            const office = parseDuration(data.totals.office);
            const outside = parseDuration(data.totals.outside);
            const commute = parseDuration(data.totals.commute);
            const total = 24; // Base the chart on a full 24-hour day

            // Calculate percentages for donut chart
            const homePct = (home / total) * 100;
            const offPct = (office / total) * 100;
            const outPct = (outside / total) * 100;
            const comPct = (commute / total) * 100;

            // The conic gradient segments (end bounds)
            const offEnd = homePct + offPct;
            const outEnd = offEnd + outPct;
            const comEnd = outEnd + comPct;

            let bgStr = '';
            if (home + office + outside + commute === 0) {
                bgStr = `conic-gradient(#f3f4f6 0% 100%)`;
            } else {
                bgStr = `conic-gradient(
                    #3b82f6 0% ${homePct}%, 
                    #22c55e ${homePct}% ${offEnd}%,
                    #facc15 ${offEnd}% ${outEnd}%,
                    #ef4444 ${outEnd}% ${comEnd}%,
                    #f3f4f6 ${comEnd}% 100%
                 )`;
            }

            document.getElementById('donut-chart').style.background = bgStr;

            // Update Legends
            document.getElementById('legend-home').innerText = data.totals.home;
            document.getElementById('legend-office').innerText = data.totals.office;
            document.getElementById('legend-outside').innerText = data.totals.outside;
            document.getElementById('legend-commute').innerText = data.totals.commute;

            document.getElementById('total-elapsed').innerText = `Elapsed Today: ${data.total_elapsed} `;
            document.getElementById('center-elapsed').innerText = data.total_elapsed;

            // Render Timeline
            renderTodayTimeline(data.segments);

            // Current Location
            const locEl = document.getElementById('current-location');
            if (data.segments && data.segments.length > 0) {
                const latest = data.segments[data.segments.length - 1];
                let iconStr = 'map-pin';
                let colorClass = 'text-gray-400';

                if (latest.place === 'home') { iconStr = 'home'; colorClass = 'text-blue-500'; }
                if (latest.place === 'office') { iconStr = 'briefcase'; colorClass = 'text-green-500'; }
                if (latest.place === 'outside') { iconStr = 'sun'; colorClass = 'text-yellow-500'; }
                if (latest.place === 'commute') { iconStr = 'navigation'; colorClass = 'text-red-500'; }

                locEl.innerHTML = `
                    <i data-lucide="${iconStr}" class="w-8 h-8 ${colorClass}"></i>
                    <span class="capitalize tracking-tight">${latest.place}</span>
                `;
            } else {
                locEl.innerHTML = `<span class="text-gray-400 italic font-medium">No activity yet</span>`;
            }

            lucide.createIcons();

        } catch (e) {
            console.error(e);
        }
    }

    function renderTodayTimeline(segments) {
        const container = document.getElementById('today-timeline');
        if (!segments || segments.length === 0) {
            container.innerHTML = `<p class="text-gray-400 italic text-center py-8">No activity recorded for today yet.</p>`;
            return;
        }

        let html = `<div class="relative pl-6 space-y-8 before:absolute before:inset-0 before:ml-10 before:-translate-x-px before:h-full before:w-0.5 before:-z-10 before:bg-gradient-to-b before:from-blue-200 before:via-blue-400 before:to-transparent">`;

        segments.forEach((seg, index) => {
            let icon = "map-pin";
            let color = "bg-gray-100 text-gray-400 border-gray-200";

            if (seg.place === 'home') {
                icon = "home";
                color = "bg-blue-50 text-blue-600 border-blue-100";
            } else if (seg.place === 'office') {
                icon = "briefcase";
                color = "bg-green-50 text-green-600 border-green-100";
            } else if (seg.place === 'outside') {
                icon = "sun";
                color = "bg-yellow-50 text-yellow-600 border-yellow-100";
            } else if (seg.place === 'commute') {
                icon = "navigation";
                color = "bg-red-50 text-red-600 border-red-100";
            }

            html += `
                <div class="relative flex items-center justify-between group">
                    <!-- Dot -->
                    <div class="absolute inset-y-0 left-0 flex items-center translate-x-[-1.15rem] z-10">
                        <div class="w-6 h-6 rounded-full border-4 border-white dark:border-slate-800 ${color.split(' ')[0]} shadow-md ring-1 ring-gray-100 dark:ring-slate-700"></div>
                    </div>

                    <!-- Content Card -->
                    <div class="bg-gray-50/50 dark:bg-slate-900/30 border border-gray-100 dark:border-slate-700/50 p-5 rounded-3xl w-full transition-all hover:bg-white dark:hover:bg-slate-800 hover:shadow-xl hover:shadow-gray-200/40 dark:hover:shadow-none hover:-translate-y-1">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div class="flex items-center gap-4">
                                <div class="p-3 rounded-2xl ${color} dark:bg-slate-700 dark:border-none shadow-sm">
                                    <i data-lucide="${icon}" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <h4 class="text-base font-black text-gray-900 dark:text-white capitalize tracking-tight">${seg.place}</h4>
                                    <div class="flex items-center gap-2 mt-0.5">
                                        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">${seg.start}</span>
                                        <i data-lucide="arrow-right" class="w-3 h-3 text-gray-300"></i>
                                        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">${seg.end}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="px-4 py-1.5 bg-white dark:bg-slate-800 border border-gray-100 dark:border-slate-700 rounded-full text-xs font-black text-blue-600 dark:text-blue-400 shadow-sm">
                                    ${seg.duration}
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        html += `</div>`;
        container.innerHTML = html;
        lucide.createIcons();
    }

    let toastTimeout;
    function showToast(message) {
        const toast = document.getElementById('toast-alert');
        document.getElementById('toast-message').innerText = message;

        // Slide in
        toast.classList.remove('translate-x-full', 'opacity-0');

        // Auto clear
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(closeToast, 5000);
    }

    function closeToast() {
        const toast = document.getElementById('toast-alert');
        toast.classList.add('translate-x-full', 'opacity-0');
    }

    async function logEvent(place) {
        const userId = getUserId();
        if (!userId) return showError("User ID not found");

        try {
            const res = await fetch(`/log?userid=${userId}&place=${place}`);
            if (!res.ok) {
                const text = await res.text();
                showToast(text);
            } else {
                // Instantly update the data
                loadTodayData();
            }
        } catch (e) {
            showToast('Network error during logging.');
        }
    }

    // Init loops
    setInterval(updateClock, 1000);
    setInterval(loadTodayData, 60000); // refresh data every minute

    updateClock();
    loadTodayData();
</script>
{{end}}
