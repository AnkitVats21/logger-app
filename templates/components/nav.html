{{define "nav"}}
<nav class="border-b border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-800 sticky top-0 z-50 shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <!-- Logo -->
        <a href="/dashboard"
            class="font-black text-xl text-blue-600 flex items-center gap-2 group transition-transform active:scale-95">
            <div class="p-2 bg-blue-50 dark:bg-blue-900/30 rounded-xl group-hover:rotate-12 transition-transform">
                <i data-lucide="activity" class="w-6 h-6"></i>
            </div>
            <span>LifeTracker</span>
        </a>

        <!-- Desktop Navigation -->
        <div class="hidden md:flex items-center gap-8 text-sm font-bold">
            <a href="/dashboard"
                class="nav-link flex items-center gap-2 text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 transition-colors">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                Dashboard
            </a>
            <a href="/insights"
                class="nav-link flex items-center gap-2 text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 transition-colors">
                <i data-lucide="pie-chart" class="w-4 h-4"></i>
                Insights
            </a>
            <a href="/events"
                class="nav-link flex items-center gap-2 text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 transition-colors">
                <i data-lucide="list-ordered" class="w-4 h-4"></i>
                Events
            </a>
            <div class="h-4 w-px bg-gray-200 dark:bg-slate-700 mx-2"></div>
            <button onclick="toggleDarkMode()"
                class="p-2.5 rounded-xl bg-gray-50 dark:bg-slate-700/50 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700 transition-all border border-gray-100 dark:border-slate-700">
                <i data-lucide="sun" class="hidden dark:block w-4 h-4"></i>
                <i data-lucide="moon" class="block dark:hidden w-4 h-4"></i>
            </button>
        </div>

        <!-- Mobile Actions -->
        <div class="flex md:hidden items-center gap-3">
            <button onclick="toggleDarkMode()"
                class="p-2.5 rounded-xl bg-gray-50 dark:bg-slate-700/50 text-gray-500 dark:text-gray-400 border border-gray-100 dark:border-slate-700">
                <i data-lucide="sun" class="hidden dark:block w-4 h-4"></i>
                <i data-lucide="moon" class="block dark:hidden w-4 h-4"></i>
            </button>
            <button id="mobile-menu-button" onclick="toggleMobileMenu()"
                class="p-2.5 rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-600/20 active:scale-95 transition-transform">
                <i data-lucide="menu" id="menu-icon" class="w-5 h-5"></i>
                <i data-lucide="x" id="close-icon" class="w-5 h-5 hidden"></i>
            </button>
        </div>
    </div>

    <!-- Mobile Navigation Overlay -->
    <div id="mobile-menu"
        class="hidden md:hidden border-t border-gray-100 dark:border-slate-700 bg-white dark:bg-slate-800 animate-in slide-in-from-top duration-300">
        <div class="px-6 py-6 space-y-4">
            <a href="/dashboard"
                class="flex items-center gap-3 p-4 rounded-2xl bg-gray-50 dark:bg-slate-900/50 font-black text-gray-900 dark:text-white">
                <i data-lucide="layout-dashboard" class="w-5 h-5 text-blue-600"></i>
                Dashboard
            </a>
            <a href="/insights"
                class="flex items-center gap-3 p-4 rounded-2xl hover:bg-gray-50 dark:hover:bg-slate-900/50 font-black text-gray-700 dark:text-gray-300 transition-colors">
                <i data-lucide="pie-chart" class="w-5 h-5 text-green-500"></i>
                Insights
            </a>
            <a href="/events"
                class="flex items-center gap-3 p-4 rounded-2xl hover:bg-gray-50 dark:hover:bg-slate-900/50 font-black text-gray-700 dark:text-gray-300 transition-colors">
                <i data-lucide="list-ordered" class="w-5 h-5 text-yellow-500"></i>
                Events
            </a>
        </div>
    </div>
</nav>

<script>
    function toggleMobileMenu() {
        const menu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');
        const closeIcon = document.getElementById('close-icon');

        const isHidden = menu.classList.contains('hidden');

        if (isHidden) {
            menu.classList.remove('hidden');
            menuIcon.classList.add('hidden');
            closeIcon.classList.remove('hidden');
        } else {
            menu.classList.add('hidden');
            menuIcon.classList.remove('hidden');
            closeIcon.classList.add('hidden');
        }
    }
</script>
{{end}}
